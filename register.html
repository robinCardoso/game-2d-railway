<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta — 2D World</title>
    <link rel="stylesheet" href="/src/shared/shell.css" />
  </head>
  <body class="shell-page">
    <div class="shell-card">
      <div class="shell-logo">
        <h1>Criar conta</h1>
        <p>Grátis — comece sua aventura</p>
      </div>
      <p id="registerError" class="shell-error" hidden></p>
      <form id="registerForm">
        <div class="shell-field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>
        <div class="shell-field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="shell-field">
          <label for="password2">Confirmar senha</label>
          <input id="password2" name="password2" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="shell-field">
          <label><input type="checkbox" id="terms" required /> Aceito os <a href="/terms.html">termos de uso</a></label>
        </div>
        <button type="submit" class="shell-btn">Registrar</button>
      </form>
      <p class="shell-links"><a href="/login.html">Já tenho conta</a></p>
    </div>
    <script type="module" src="/src/auth/register.ts"></script>
  </body>
</html>
